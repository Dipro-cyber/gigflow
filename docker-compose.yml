version: '3.9'

services:
  mongo:
    image: mongo:7.0
    container_name: gigflow_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - gigflow_network
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: gigflow_server
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/gigflow
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
      - CLIENT_URL=${CLIENT_URL:-http://localhost:3000}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - gigflow_network

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:5000}
    container_name: gigflow_client
    restart: unless-stopped
    ports:
      - '3000:80'
    depends_on:
      - server
    networks:
      - gigflow_network

volumes:
  mongo_data:

networks:
  gigflow_network:
    driver: bridge
